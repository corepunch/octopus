<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile – Octopus</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav id="nav">
  <a class="nav-logo" href="index.html">🐙 Octopus</a>
  <div class="nav-links" id="nav-links"></div>
</nav>

<div class="page-wrap">
  <div class="main-col" id="profile-container">
    <div class="loading">Loading profile…</div>
  </div>

  <aside class="sidebar">
    <div class="widget">
      <h3>About</h3>
      <p style="font-size:13px;color:#666;line-height:1.5;">
        Follow this writer to see their posts in your <a href="index.html">Following</a> feed.
      </p>
    </div>
  </aside>
</div>

<!-- ── Handlebars templates ─────────────────────────────────── -->
<script id="tpl-post-card" type="text/x-handlebars-template">
  <div class="post-card">
    <a href="post.html?id={{id}}" class="post-card-title">{{title}}</a>
    <div class="post-meta">
      by <a href="profile.html?id={{authorId}}" class="author-link">{{authorName}}</a>
      · {{timeAgo}}
    </div>
    <p class="post-excerpt">{{excerpt}}</p>
    <div>{{#each tags}}<a href="search.html?tag={{this}}" class="tag">#{{this}}</a>{{/each}}</div>
  </div>
</script>

<script src="https://cdn.jsdelivr.net/npm/handlebars@4.7.8/dist/handlebars.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/appwrite@16/dist/iife/sdk.js"></script>
<script src="js/config.js"></script>
<script src="js/appwrite.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/pages/profile.js"></script>

</body>
</html>
