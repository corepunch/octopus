name: Provision Appwrite Schema

on:
  # Run once manually from the Actions tab after adding APPWRITE_API_KEY to secrets
  workflow_dispatch:
  # Also run automatically on pushes that change the schema or provisioning scripts
  push:
    branches:
      - main
    paths:
      - 'schemas/octopus-schema.yaml'
      - 'scripts/schema-parser.sh'
      - 'scripts/provision-appwrite.sh'

permissions:
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (jq + yq)
        run: |
          sudo apt-get install -y jq
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Provision Appwrite schema
        env:
          APPWRITE_API_KEY:      ${{ secrets.APPWRITE_API_KEY }}
          APPWRITE_ENDPOINT:     "https://fra.cloud.appwrite.io/v1"
          APPWRITE_PROJECT_ID:   "69f1c06800389dc6a1a0"
          # Override with your own Pages domain if you fork this repository.
          GITHUB_PAGES_HOSTNAME: "corepunch.github.io"
        run: bash scripts/provision-appwrite.sh
