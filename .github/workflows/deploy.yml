name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  # Allow running manually from the Actions tab
  workflow_dispatch:

# Grant GITHUB_TOKEN the permissions needed for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment at a time; cancel in-flight runs
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install xsltproc
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends xsltproc

      - name: Build site into dist/
        run: bash scripts/build.sh

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Deploy only the generated dist/ directory
          path: "dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
