<?xml version="1.0" encoding="UTF-8"?>
<page title="Sign In – Octopus" name="signin" markdown="false">

    <div class="center-col">
      <div class="card">
        <h1 class="card-title">Sign In</h1>

        <div class="alert" id="alert"></div>

        <form id="signin-form" novalidate="novalidate">
          <div class="form-group">
            <label for="email">Email address</label>
            <input class="form-control" id="email" type="email" placeholder="you@example.com" required="required" autocomplete="email"/>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input class="form-control" id="password" type="password" placeholder="••••••••" required="required" autocomplete="current-password"/>
          </div>

          <button class="btn btn-primary btn-block" id="btn-signin" type="submit" data-icon="log-in">Sign In</button>
        </form>

        <p class="form-footer">
          Don't have an account? <a href="signup.html">Sign up</a>
        </p>
      </div>
    </div>

</page>
