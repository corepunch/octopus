<?xml version="1.0" encoding="UTF-8"?>
<page title="New Post – Octopus" name="create" markdown="true">

  <div class="page-wrap">
    <nav class="left-nav" id="left-nav"></nav>

    <div class="main-col">
      <div class="card">
        <h1 class="card-title" style="text-align:left;">New Post</h1>

        <div class="alert" id="alert"></div>

        <form id="create-form" novalidate="novalidate">

          <div class="form-group">
            <label for="title">Title</label>
            <input class="form-control" id="title" type="text" placeholder="An interesting title…" required="required"/>
          </div>

          <div class="form-group">
            <label for="tags">Tags <span class="label-note">(comma-separated)</span></label>
            <input class="form-control" id="tags" type="text" placeholder="technology, writing, opinion"/>
          </div>

          <!-- Side-by-side editor + preview -->
          <div class="form-group">
            <div class="editor-wrap">
              <div class="editor-pane">
                <label for="content">Content <span class="label-note">(Markdown supported)</span></label>
                <textarea class="form-control" id="content" placeholder="Write your post in **Markdown**…"></textarea>
              </div>
              <div class="preview-pane-wrap">
                <label>Preview</label>
                <div class="preview-pane markdown-body" id="preview"></div>
              </div>
            </div>
          </div>

          <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:4px;">
            <a href="index.html" class="btn btn-secondary" data-icon="x">Cancel</a>
            <button class="btn btn-primary" id="btn-publish" type="submit" data-icon="send">Publish</button>
          </div>
        </form>
      </div>
    </div>

    <aside class="right-col">
      <div class="widget">
        <h3>Writing Tips</h3>
        <ul class="tip-list">
          <li>Use <strong>**bold**</strong> or <em>*italic*</em></li>
          <li>Add headings with <strong>#</strong></li>
          <li>Link with <strong>[text](url)</strong></li>
          <li>Code blocks with <strong>```</strong></li>
        </ul>
      </div>
    </aside>
  </div>

</page>
