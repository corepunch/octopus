<?xml version="1.0" encoding="UTF-8"?>
<page title="New Post – Octopus" name="create" markdown="true">

  <div class="page-wrap">
    <nav class="left-nav" id="left-nav"></nav>

    <div class="main-col">
      <div class="card">
        <h1 class="card-title" style="text-align:left;">New Post</h1>

        <!-- Post type picker -->
        <div class="post-type-picker" id="post-type-picker">
          <button class="post-type-btn active" data-type="text" type="button" data-icon="file-text">Text</button>
          <button class="post-type-btn" data-type="photo" type="button" data-icon="image">Photo</button>
          <button class="post-type-btn" data-type="quote" type="button" data-icon="quote">Quote</button>
          <button class="post-type-btn" data-type="link" type="button" data-icon="link">Link</button>
        </div>

        <div class="alert" id="alert"></div>

        <form id="create-form" novalidate="novalidate">

          <!-- ── Text fields (shared: title + tags) ─────────────── -->
          <div class="form-group" id="field-title">
            <label for="title">Title</label>
            <input class="form-control" id="title" type="text" placeholder="An interesting title…"/>
          </div>

          <div class="form-group">
            <label for="tags">Tags <span class="label-note">(comma-separated)</span></label>
            <input class="form-control" id="tags" type="text" placeholder="technology, writing, opinion"/>
          </div>

          <!-- ── Text post: markdown editor ───────────────────── -->
          <div id="section-text">
            <div class="form-group">
              <div class="editor-wrap">
                <div class="editor-pane">
                  <label for="content">Content <span class="label-note">(Markdown supported)</span></label>
                  <textarea class="form-control" id="content" placeholder="Write your post in **Markdown**…"></textarea>
                </div>
                <div class="preview-pane-wrap">
                  <label>Preview</label>
                  <div class="preview-pane markdown-body" id="preview"></div>
                </div>
              </div>
            </div>
          </div>

          <!-- ── Photo post ────────────────────────────────────── -->
          <div id="section-photo" style="display:none;">
            <div class="form-group">
              <label for="photo-file">Image</label>
              <input class="form-control" id="photo-file" type="file" accept="image/*"/>
              <div class="label-note" style="margin-top:4px;">Images are compressed to JPEG at 30% quality to save space.</div>
            </div>
            <div id="photo-preview-wrap" style="display:none;margin-bottom:12px;">
              <img id="photo-preview-img" alt="Preview" style="max-width:100%;border-radius:4px;border:1px solid var(--color-border);"/>
            </div>
            <div class="form-group">
              <label for="photo-caption">Caption <span class="label-note">(optional)</span></label>
              <textarea class="form-control" id="photo-caption" placeholder="Describe the photo…" style="min-height:60px;"></textarea>
            </div>
          </div>

          <!-- ── Quote post ─────────────────────────────────────── -->
          <div id="section-quote" style="display:none;">
            <div class="form-group">
              <label for="quote-text">Quote</label>
              <textarea class="form-control" id="quote-text" placeholder="The quote text…" style="min-height:100px;font-style:italic;font-size:16px;"></textarea>
            </div>
            <div class="form-group">
              <label for="quote-source">Source <span class="label-note">(optional)</span></label>
              <input class="form-control" id="quote-source" type="text" placeholder="Author or origin of the quote"/>
            </div>
          </div>

          <!-- ── Link post ──────────────────────────────────────── -->
          <div id="section-link" style="display:none;">
            <div class="form-group">
              <label for="link-url">URL</label>
              <input class="form-control" id="link-url" type="url" placeholder="https://example.com"/>
            </div>
            <div class="form-group">
              <label for="link-desc">Description <span class="label-note">(optional)</span></label>
              <textarea class="form-control" id="link-desc" placeholder="Why this link is interesting…" style="min-height:80px;"></textarea>
            </div>
          </div>

          <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:4px;">
            <a href="index.html" class="btn btn-secondary" data-icon="x">Cancel</a>
            <button class="btn btn-primary" id="btn-publish" type="submit" data-icon="send">Publish</button>
          </div>
        </form>
      </div>
    </div>

    <aside class="right-col">
      <div class="widget" id="type-tips">
        <h3>Writing Tips</h3>
        <ul class="tip-list">
          <li>Use <strong>**bold**</strong> or <em>*italic*</em></li>
          <li>Add headings with <strong>#</strong></li>
          <li>Link with <strong>[text](url)</strong></li>
          <li>Code blocks with <strong>```</strong></li>
        </ul>
      </div>
    </aside>
  </div>

</page>
