<?xml version="1.0" encoding="UTF-8"?>
<page title="Search – Octopus" name="search" markdown="false">
  <body>

    <div class="page-wrap">
      <div class="main-col">

        <form class="search-bar" id="search-form">
          <input class="form-control" id="q" type="search"
            placeholder="Search posts, people, or #tags…" autofocus="autofocus"/>
          <button class="btn btn-primary" type="submit" data-icon="search">Search</button>
        </form>

        <div id="results"></div>

      </div>

      <aside class="sidebar">
        <div class="widget">
          <h3>Tips</h3>
          <ul style="font-size:13px;color:#666;line-height:1.7;padding-left:16px;">
            <li>Search by keyword to find posts</li>
            <li>Type a name to find people</li>
            <li>Prefix with <strong>#</strong> to filter by tag</li>
          </ul>
        </div>

        <div class="widget">
          <div class="widget-footer-links">
            <a href="about.html">About</a>
            <a href="terms.html">Terms</a>
            <a href="privacy.html">Privacy</a>
            <a href="impressum.html">Impressum</a>
          </div>
        </div>
      </aside>
    </div>

  </body>
</page>
