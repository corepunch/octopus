<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search – Octopus</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav id="nav">
  <a class="nav-logo" href="index.html">🐙 Octopus</a>
  <div class="nav-links" id="nav-links"></div>
</nav>

<div class="page-wrap">
  <div class="main-col">

    <form class="search-bar" id="search-form">
      <input class="form-control" id="q" type="search"
        placeholder="Search posts, people, or #tags…" autofocus />
      <button class="btn btn-primary" type="submit">Search</button>
    </form>

    <div id="results"></div>

  </div>

  <aside class="sidebar">
    <div class="widget">
      <h3>Tips</h3>
      <ul style="font-size:13px;color:#666;line-height:1.7;padding-left:16px;">
        <li>Search by keyword to find posts</li>
        <li>Type a name to find people</li>
        <li>Prefix with <strong>#</strong> to filter by tag</li>
      </ul>
    </div>
  </aside>
</div>

<!-- ── Handlebars templates ─────────────────────────────────── -->
<script id="tpl-post-result" type="text/x-handlebars-template">
  <div class="post-card">
    <a href="post.html?id={{id}}" class="post-card-title">{{title}}</a>
    <div class="post-meta">
      by <a href="profile.html?id={{authorId}}" class="author-link">{{authorName}}</a>
      · {{timeAgo}}
    </div>
    <p class="post-excerpt">{{excerpt}}</p>
    <div>{{#each tags}}<a href="search.html?tag={{this}}" class="tag">#{{this}}</a>{{/each}}</div>
  </div>
</script>

<script id="tpl-user-result" type="text/x-handlebars-template">
  <div class="post-card" style="display:flex;align-items:center;gap:12px;">
    <div class="avatar" style="width:40px;height:40px;font-size:18px;">{{initial}}</div>
    <div>
      <a href="profile.html?id={{id}}" style="font-weight:bold;color:#1c2938;">{{username}}</a>
      {{#if bio}}<div class="post-excerpt" style="margin-top:3px;">{{bio}}</div>{{/if}}
    </div>
  </div>
</script>

<script src="https://cdn.jsdelivr.net/npm/handlebars@4.7.8/dist/handlebars.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/appwrite@16/dist/iife/sdk.js"></script>
<script src="js/config.js"></script>
<script src="js/appwrite.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/pages/search.js"></script>

</body>
</html>
