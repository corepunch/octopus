<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – Octopus</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav id="nav">
  <a class="nav-logo" href="index.html">🐙 Octopus</a>
  <div class="nav-links" id="nav-links"></div>
</nav>

<div class="center-col">
  <div class="card">
    <h1 class="card-title">Create an Account</h1>

    <div class="alert" id="alert"></div>

    <form id="signup-form" novalidate>
      <div class="form-group">
        <label for="name">Display name</label>
        <input class="form-control" id="name" type="text" placeholder="Your name" required autocomplete="name" />
      </div>

      <div class="form-group">
        <label for="email">Email address</label>
        <input class="form-control" id="email" type="email" placeholder="you@example.com" required autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="password">Password <span style="color:#999;font-weight:normal;">(min. 8 characters)</span></label>
        <input class="form-control" id="password" type="password" placeholder="••••••••" required autocomplete="new-password" />
      </div>

      <div class="form-group">
        <label for="confirm">Confirm password</label>
        <input class="form-control" id="confirm" type="password" placeholder="••••••••" required autocomplete="new-password" />
      </div>

      <button class="btn btn-primary btn-block" id="btn-signup" type="submit">Create Account</button>
    </form>

    <p class="form-footer">
      Already have an account? <a href="signin.html">Sign in</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/handlebars@4.7.8/dist/handlebars.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/appwrite@16/dist/iife/sdk.js"></script>
<script src="js/config.js"></script>
<script src="js/appwrite.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/pages/signup.js"></script>

</body>
</html>
